<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Deep Royal Blue to Midnight Navy -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e2270" />
      <stop offset="100%" stop-color="#0b0e3f" />
    </linearGradient>
    
    <!-- Premium Gold Gradient for Accents -->
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b37700" />
      <stop offset="50%" stop-color="#f0a500" />
      <stop offset="100%" stop-color="#ffe27c" />
    </linearGradient>

    <!-- Silver/White Metallic Gradient for Structure -->
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>
    
    <!-- Soft premium drop shadow to make the Landmark emblem pop -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="12" flood-color="#000000" flood-opacity="0.45" />
    </filter>
  </defs>

  <!-- Background rounded rectangle -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />
  
  <!-- Subtle gold border for a premium, card-like luxury finish -->
  <rect x="12" y="12" width="488" height="488" rx="100" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-opacity="0.2" />

  <!-- Landmark Icon Group -->
  <g filter="url(#shadow)">
    <!-- Classical Pediment (Triangular Roof) -->
    <polygon points="256,96 84,204 428,204" fill="url(#goldGrad)" />
    
    <!-- Pediment inner shadow detail -->
    <polygon points="256,128 136,192 376,192" fill="#0a0d42" opacity="0.3" />

    <!-- Architrave (under roof) -->
    <rect x="110" y="204" width="292" height="24" rx="4" fill="url(#silverGrad)" />

    <!-- 4 Columns -->
    <rect x="134" y="228" width="26" height="132" rx="3" fill="url(#silverGrad)" />
    <rect x="209" y="228" width="26" height="132" rx="3" fill="url(#silverGrad)" />
    <rect x="277" y="228" width="26" height="132" rx="3" fill="url(#silverGrad)" />
    <rect x="352" y="228" width="26" height="132" rx="3" fill="url(#silverGrad)" />

    <!-- Column Capitals (Gold Accent Tops) -->
    <rect x="128" y="228" width="38" height="10" rx="2" fill="url(#goldGrad)" />
    <rect x="203" y="228" width="38" height="10" rx="2" fill="url(#goldGrad)" />
    <rect x="271" y="228" width="38" height="10" rx="2" fill="url(#goldGrad)" />
    <rect x="346" y="228" width="38" height="10" rx="2" fill="url(#goldGrad)" />

    <!-- Foundation / Steps (Bases) -->
    <rect x="110" y="360" width="292" height="22" rx="4" fill="url(#silverGrad)" />
    <rect x="84" y="382" width="344" height="26" rx="6" fill="url(#goldGrad)" />
  </g>
</svg>
